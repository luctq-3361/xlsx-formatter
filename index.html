<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Fixer</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
</head>
<body data-lang="ja">
  <div class="container">

    <header>
      <div class="brand"><span class="brand-dot"></span>XLSX FORMATTER</div>
      <div class="header-right">
        <div class="lang-switch" role="tablist">
          <button data-lang="vi">VI</button>
          <button data-lang="ja" class="active">JA</button>
        </div>
      </div>
    </header>

    <section class="hero">
      <h1 data-i18n-html="title"></h1>
      <p class="subtitle" data-i18n="subtitle"></p>
    </section>

    <section class="issues" id="issues"></section>

    <div class="uploader" id="uploader">
      <label class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".xlsx" multiple>
        <div class="drop-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <div class="drop-text" data-i18n-html="dropText"></div>
        <div class="drop-hint" data-i18n="dropHint"></div>
      </label>

      <div class="file-summary" id="fileSummary">
        <div class="file-summary-text" id="fileSummaryText"></div>
        <button class="file-clear-all" id="fileClearAll" type="button" data-i18n="clearAll"></button>
      </div>

      <div class="file-list" id="fileList"></div>

      <div class="settings">
        <div class="setting">
          <div class="setting-label-row">
            <label data-i18n="settingFont"></label>
            <div class="help-wrap">
              <button class="help-btn" type="button" aria-label="help">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
              </button>
              <div class="help-tooltip" data-i18n="helpFont"></div>
            </div>
          </div>
          <select id="fontSelect">
            <option value="keep" data-i18n="fontKeep"></option>
            <option value="Yu Gothic" data-i18n="fontRecommended"></option>
            <option value="BIZ UDGothic">BIZ UDGothic</option>
            <option value="Meiryo">Meiryo</option>
            <option value="MS PGothic">MS PGothic</option>
            <option value="MS Gothic">MS Gothic</option>
            <option value="Hiragino Sans">Hiragino Sans</option>
            <option value="Noto Sans JP">Noto Sans JP</option>
            <option value="Arial Unicode MS">Arial Unicode MS</option>
          </select>
        </div>
        <div class="setting">
          <div class="setting-label-row">
            <label data-i18n="settingAlign"></label>
            <div class="help-wrap">
              <button class="help-btn" type="button" aria-label="help">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
              </button>
              <div class="help-tooltip" data-i18n="helpAlign"></div>
            </div>
          </div>
          <select id="alignSelect">
            <option value="keep" data-i18n="alignKeep"></option>
            <option value="left-center" data-i18n="alignLeftMiddle"></option>
            <option value="center-center" data-i18n="alignCenterMiddle"></option>
            <option value="right-center" data-i18n="alignRightMiddle"></option>
            <option value="auto" data-i18n="alignAuto"></option>
          </select>
        </div>
      </div>
    </div>

    <div class="action">
      <button class="btn" id="processBtn" disabled>
        <span id="btnLabel"></span> <span class="arrow">→</span>
      </button>
    </div>

    <div class="log" id="log"></div>
  </div>

<script src="app.js"></script>
</body>
</html>
